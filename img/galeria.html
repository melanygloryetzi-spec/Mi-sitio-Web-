<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galería de Gatitos</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #2b1020, #4a1633);
      padding:40px;
      color:white;
      min-height:100vh;
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      font-size:3rem;
      color:#fff;
    }

    .gallery{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap:20px;
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.4);
      transition:0.4s;
      cursor:pointer;
      background:#000;
    }

    .card:hover{
      transform:translateY(-10px) scale(1.02);
      box-shadow:0 15px 35px rgba(255,105,180,0.5);
    }

    .card img{
      width:100%;
      height:320px;
      object-fit:cover;
      transition:0.5s;
      display:block;
    }

    .card:hover img{
      transform:scale(1.1);
    }

    .overlay{
      position:absolute;
      bottom:0;
      width:100%;
      padding:20px;
      background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    }

    .overlay h3{
      font-size:1.2rem;
      margin-bottom:5px;
      color:#ffb6d9;
    }

    .overlay p{
      font-size:0.9rem;
      opacity:0.9;
    }
  </style>
</head>
