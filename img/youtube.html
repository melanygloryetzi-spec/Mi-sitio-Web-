<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Video de YouTube</title>

<style>

body{

    margin:0;
    padding:40px;

    background:linear-gradient(135deg,#1a1026,#2d1639,#471c52);

    font-family:Arial, sans-serif;

    text-align:center;

    color:white;
}

.container{

    width:80%;

    max-width:800px;

    margin:auto;

    background:rgba(255,255,255,0.08);

    padding:30px;

    border-radius:25px;

    box-shadow:0 0 30px rgba(255,105,180,0.4);
}

h1{

    margin-bottom:25px;

    font-size:38px;

    text-shadow:0 0 15px rgba(255,105,180,0.7);
}

iframe{

    width:100%;

    height:450px;

    border:none;

    border-radius:20px;

    box-shadow:0 0 20px rgba(255,105,180,0.5);
}

p{

    margin-top:20px;

    color:#ffb6da;

    font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>🌸 Bruno Mars - Just The Way You Are 🌸</h1>

<iframe
src="video.mp4" type="video/mp4">
allowfullscreen>
</iframe>

<p> Disfruta de buen gusto musical </p>

</div>

</body>

</html>
